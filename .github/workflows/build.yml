name: Build Mimir Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-tauri:
    runs-on: windows-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node / npm ────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── Rust toolchain ────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Python + PyInstaller ──────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt pyinstaller

      - name: Build PyInstaller bundle
        working-directory: backend
        run: pyinstaller mimir-backend.spec

      - name: Copy backend bundle to Tauri resources
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item -Recurse -Force backend/dist/mimir-backend src-tauri/binaries/mimir-backend

      # ── Frontend ──────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ── Build Tauri (NSIS installer) ──────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName:       ${{ github.ref_name }}
          releaseName:   "Mimir ${{ github.ref_name }}"
          releaseBody:   "See CHANGELOG for details."
          releaseDraft:  true
          prerelease:    false
          projectPath:   .
