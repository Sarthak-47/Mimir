name: Release

# Triggered by pushing a version tag: git tag v0.3.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Build installer and publish release
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # ── Node.js ───────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── Rust ──────────────────────────────────────────────────
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Python backend bundle ──────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies + PyInstaller
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build PyInstaller bundle
        working-directory: backend
        run: pyinstaller mimir-backend.spec

      - name: Copy backend bundle into Tauri resources
        run: |
          xcopy /E /I backend\dist\mimir-backend src-tauri\binaries\mimir-backend
          cd backend\dist
          Compress-Archive -Path mimir-backend\_internal -DestinationPath ..\..\src-tauri\resources\backend-internal.zip -Force
        shell: cmd

      # ── Frontend ──────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ── Tauri build ───────────────────────────────────────────
      - name: Build Tauri app (signed)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing key generated with: cargo tauri signer generate -w ~/.tauri/mimir.key
          # Add the private key content as this GitHub secret:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName:       ${{ github.ref_name }}
          releaseName:   "Mimir ${{ github.ref_name }}"
          releaseBody:   "See [CHANGELOG](https://github.com/Sarthak-47/Mimir/blob/main/CHANGELOG.md) for release notes."
          releaseDraft:  false
          prerelease:    false
          projectPath:   "."
          # Tell tauri-action where the frontend dist lives
          distPath:      "frontend/dist"

      # ── Update manifest ───────────────────────────────────────
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" | sed 's/^v//' >> $GITHUB_OUTPUT
        shell: bash

      - name: Generate latest.json update manifest
        run: |
          python scripts/build-manifest.py \
            --version "${{ steps.version.outputs.VERSION }}" \
            --out latest.json
        shell: bash

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
