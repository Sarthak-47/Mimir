[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short traceback by default; use -v for verbose
addopts = --tb=short -q

# Suppress noisy third-party deprecation warnings
filterwarnings =
    ignore::DeprecationWarning:chromadb
    ignore::DeprecationWarning:pydantic
    ignore::UserWarning:sentence_transformers
